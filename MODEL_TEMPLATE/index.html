<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Model Title</title>
  <link rel="stylesheet" href="../../assets/shared.css">
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <main class="model-shell">
    <header class="model-header">
      <p class="eyebrow">Domain</p>
      <h1>Model Title</h1>
      <p class="lede">One-sentence explanation of the model interaction.</p>
    </header>

    <section class="workspace">
      <aside class="controls" aria-label="Model controls">
        <div class="control-group">
          <div class="control-row">
            <label for="alpha">Alpha</label>
            <output data-output="alpha"></output>
          </div>
          <input id="alpha" type="range" min="0" max="10" step="0.1" value="2">

          <div class="control-row">
            <label for="beta">Beta</label>
            <output data-output="beta"></output>
          </div>
          <input id="beta" type="range" min="-5" max="5" step="0.1" value="1">
        </div>
      </aside>

      <section class="chart-panel">
        <div id="chart" class="chart" role="img" aria-label="Interactive model chart"></div>
        <div id="metrics" class="metric-grid"></div>
        <p class="note">Replace this note with model-specific interpretation guidance.</p>
      </section>
    </section>
  </main>
  <script type="module" src="./model.js"></script>
</body>
</html>
