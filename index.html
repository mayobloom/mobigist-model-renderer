<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mobigist Model Renderer</title>
  <link rel="stylesheet" href="./assets/shared.css">
</head>
<body>
  <main class="site-shell">
    <header class="site-header">
      <p class="eyebrow">Mobigist</p>
      <h1>Model Renderer</h1>
      <p class="lede">Interactive transportation, operations, and econometric model sketches for posts.</p>
    </header>

    <section id="model-list" class="model-list" aria-label="Available models">
      <p class="note">Loading models...</p>
    </section>
  </main>

  <script type="module">
    const modelList = document.getElementById('model-list');

    function createModelCard(model) {
      const card = document.createElement('a');
      card.className = 'model-card';
      card.href = `./models/${model.slug}/`;

      const category = document.createElement('span');
      category.textContent = model.category;

      const title = document.createElement('strong');
      title.textContent = model.title;

      const description = document.createElement('small');
      description.textContent = model.description;

      card.append(category, title, description);
      return card;
    }

    try {
      const response = await fetch('./models/manifest.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const models = await response.json();
      modelList.replaceChildren(...models.map(createModelCard));
    } catch (error) {
      modelList.replaceChildren();
      const message = document.createElement('p');
      message.className = 'note';
      message.textContent = 'Unable to load the model list. Run this page through a local server or check models/manifest.json.';
      modelList.append(message);
      console.error('Failed to load model manifest:', error);
    }
  </script>
</body>
</html>
