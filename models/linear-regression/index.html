<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Linear Regression</title>
  <link rel="stylesheet" href="../../assets/shared.css">
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <main class="model-shell">
    <header class="model-header">
      <p class="eyebrow">Mobility Data Analysis</p>
      <h1>Simple Linear Regression</h1>
      <p class="lede">Adjust slope and intercept to explore the linear relationship between trip distance and travel time.</p>
    </header>

    <section class="workspace">
      <aside class="controls" aria-label="Linear regression controls">
        <p class="formula">y = Wx + b</p>
        <div class="control-group">
          <div class="control-row">
            <label for="weight">Slope W</label>
            <output data-output="weight"></output>
          </div>
          <input type="range" id="weight" min="0" max="4" step="0.1" value="1.5">
        </div>
        <div class="control-group">
          <div class="control-row">
            <label for="bias">Intercept b</label>
            <output data-output="bias"></output>
          </div>
          <input type="range" id="bias" min="-5" max="15" step="0.5" value="5.0">
        </div>
        <div class="control-group">
          <label class="checkbox-row" for="lock-axes">
            <input id="lock-axes" type="checkbox" checked>
            Lock x/y axes
          </label>
        </div>
      </aside>

      <section class="chart-panel">
        <div id="plot" class="chart" role="img" aria-label="Linear regression scatterplot"></div>
      </section>
    </section>
  </main>

  <script type="module" src="./model.js"></script>
</body>
</html>
