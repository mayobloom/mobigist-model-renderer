<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Traffic Flow Theory</title>
  <link rel="stylesheet" href="../../assets/shared.css">
  <link rel="stylesheet" href="./style.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <main class="model-shell">
    <header class="model-header">
      <p class="eyebrow">Traffic Flow</p>
      <h1>Fundamental Diagram Models</h1>
      <p class="lede">Compare Greenshields, Greenberg, and Underwood speed-density relationships.</p>
    </header>

    <section class="workspace">
      <aside class="controls" aria-label="Traffic flow controls">
        <div class="control-group">
          <label for="model">Model</label>
          <select id="model">
            <option value="greenshields">Greenshields</option>
            <option value="greenberg">Greenberg</option>
            <option value="underwood">Underwood</option>
          </select>
          <p class="model-equation" id="equation"></p>
        </div>
        <div class="control-group">
          <div class="control-row"><label for="free-speed">Free-flow speed</label><output data-output="free-speed"></output></div>
          <input id="free-speed" type="range" min="40" max="130" step="1" value="90">
          <div class="control-row"><label for="jam-density">Jam density</label><output data-output="jam-density"></output></div>
          <input id="jam-density" type="range" min="80" max="240" step="5" value="160">
          <div class="control-row"><label for="critical-density">Underwood k0</label><output data-output="critical-density"></output></div>
          <input id="critical-density" type="range" min="15" max="90" step="1" value="42">
          <div class="control-row"><label for="greenberg-c">Greenberg c</label><output data-output="greenberg-c"></output></div>
          <input id="greenberg-c" type="range" min="10" max="55" step="1" value="28">
        </div>
      </aside>

      <section class="chart-panel">
        <div id="speed-chart" class="chart" role="img" aria-label="Speed density curve"></div>
        <div id="flow-chart" class="chart" role="img" aria-label="Flow density curve"></div>
        <div class="metric-grid" id="metrics"></div>
      </section>
    </section>
  </main>
  <script type="module" src="./model.js"></script>
</body>
</html>
